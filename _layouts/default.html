<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none';
    script-src 'self' https://cdn.jsdelivr.net/ https://utteranc.es/ https://pyscript.net/ 'unsafe-inline' 'unsafe-eval';
    style-src 'self' https://cdnjs.cloudflare.com/ https://cdn.jsdelivr.net/ https://pyscript.net/ 'unsafe-inline';
    img-src 'self' https://ghchart.rshah.org/PENG-AO;
    font-src 'self' https://fonts.googleapis.com/ https://cdn.jsdelivr.net/ https://cdnjs.cloudflare.com/;
    connect-src 'self' https://cdn.jsdelivr.net/ https://pyscript.net/;
    media-src 'self';
    object-src 'self';
    child-src 'self' https://www.google.com/ https://www.youtube.com/ https://utteranc.es/ 'unsafe-inline';
    form-action 'none';
    base-uri 'self'"/>
<meta http-equiv="X-XSS-Protection"  content="1;mode=block" always>
<meta http-equiv="Referrer-Policy" content="no-referrer, strict-origin-when-cross-origin">

{% include head.html %}

<body>
  <div class="container">
    {% include header.html %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
</body>
</html>
