<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}-{{ page.title }}</title>
  <link rel="icon" type="image/png" href="{{ "/assets/favicon.png" | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" />
  {% seo title=false %}

  {% if site.listen_for_clients_preferred_style %}
    <link rel="stylesheet" type="text/css" href="{{ "/assets/main.css" | relative_url }}">
  {% else %}
    {% if site.style == 'light' %}
      <link rel="stylesheet" type="text/css" href="{{ "/assets/main-light.css" | relative_url }}">
    {% else %}
      <link rel="stylesheet" type="text/css" href="{{ "/assets/main-dark.css" | relative_url }}">
    {% endif %}
  {% endif %}

  {% if jekyll.environment == 'production' %}
    {% include google-analytics.html %}
  {% endif %}
  <!-- jquery -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <!-- mathjax -->
  <script> 
    MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        processEscapes: true
      }
    };
    </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <!-- jVectorMap -->
  <script src="/assets/js/jquery-jvectormap-min.js"></script>
  <script src="/assets/js/jquery-jvectormap-cn-merc.js"></script>
  <script src="/assets/js/jquery-jvectormap-jp-merc.js"></script>
  <link rel="stylesheet" href="/assets/css/jquery-jvectormap.css" type="text/css" media="screen"/>
</head>
